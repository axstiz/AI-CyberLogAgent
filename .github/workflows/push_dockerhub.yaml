name: Build and Push to Docker Hub

on:
  push:
    branches: [main]
jobs:
  build_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./log_ai_agent/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/log-ai-agent-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/log-ai-agent-backend:${{ github.run_id }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./log_ai_agent/site
          file: ./log_ai_agent/site/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/log_ai_agent_frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/log_ai_agent_frontend:${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max