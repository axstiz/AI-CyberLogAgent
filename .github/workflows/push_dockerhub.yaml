name: Build and Push to Docker Hub

on:
  push:
    tags:
      - '*'

jobs:
  build_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version From Git Tag
        id: version
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=$TAG

          echo "Git tag: $TAG"
          echo "Version: $VERSION"

          echo "new_tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------- BACKEND ----------------
      - name: Build and push wavescan-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./log_ai_agent/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wavescan-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wavescan-backend:${{ steps.version.outputs.new_tag }}

      # ---------------- FRONTEND ----------------
      - name: Build and push wavescan-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./log_ai_agent/site
          file: ./log_ai_agent/site/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wavescan-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wavescan-frontend:${{ steps.version.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      # ---------------- VECTOR ----------------
      - name: Build and push wavescan-vector
        uses: docker/build-push-action@v5
        with:
          context: ./log_ai_agent/vector
          file: ./log_ai_agent/vector/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wavescan-vector:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wavescan-vector:${{ steps.version.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      # ---------------- POSTGRES ----------------
      - name: Build and push wavescan-postgres
        uses: docker/build-push-action@v5
        with:
          context: ./log_ai_agent
          file: ./log_ai_agent/postgres/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wavescan-postgres:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wavescan-postgres:${{ steps.version.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=min