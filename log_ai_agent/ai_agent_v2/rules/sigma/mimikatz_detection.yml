title: Mimikatz Credential Dumping Detection
id: apache-mimikatz-001
status: experimental
description: Detects usage of Mimikatz or Mimikatz-like tools for credential dumping.
author: AI CyberLog Agent
date: 2026/04/15
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://github.com/gentilkiwi/mimikatz
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    category: webserver
    product: apache
detection:
    selection_tool:
        message|contains:
            - 'mimikatz'
            - 'mimikatz.exe'
    selection_module:
        message|contains:
            - 'sekurlsa::'
            - 'lsadump::'
            - 'kerberos::'
            - 'privilege::debug'
            - 'mimidrv.sys'
    condition: selection_tool or selection_module
falsepositives:
    - Security testing with authorized tools
level: critical
