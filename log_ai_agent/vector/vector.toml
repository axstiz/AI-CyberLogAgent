[sources.external_log_files]
type = "file"
include = ["/data/external/**/*.log", "/data/external/**/*.txt"]
exclude = ["/data/external/attack_timeline.log"]
ignore_older_secs = 0
read_from = "beginning"
fingerprint.strategy = "device_and_inode"

[transforms.normalize_event]
type = "remap"
inputs = ["external_log_files"]
source = '''
.file_path = to_string(.file) ?? "unknown"
.message = to_string(.message) ?? ""
.timestamp = format_timestamp!(now(), "%+", "UTC")
'''

[transforms.chunk_logs]
type = "lua"
version = "2"
inputs = ["normalize_event", "pipeline_heartbeat"]
hooks.process = "process"
search_dirs = ["/etc/vector/lua"]
source = "require('chunk_logs')"

[sources.pipeline_heartbeat]
type = "internal_metrics"
scrape_interval_secs = 5

[transforms.only_chunk_batches]
type = "remap"
inputs = ["chunk_logs"]
source = '''
# Lua batch events arrive as top-level fields.
# Keep only events that actually contain records, and normalize optional fields.
if .records == null {
	if .log != null {
		. = .log
	}
}

if .records == null {
	abort
}

if .batch_sequence == null {
	.batch_sequence = 0
}

if .collected_at_compact == null {
	.collected_at_compact = format_timestamp!(now(), "%Y%m%dT%H%M%SZ", "UTC")
}
'''

[sinks.kafka_batches]
type = "kafka"
inputs = ["only_chunk_batches"]
bootstrap_servers = "${KAFKA_BOOTSTRAP_SERVERS}"
topic = "${KAFKA_TOPIC}"
encoding.codec = "json"
batch.max_events = 250
batch.timeout_secs = 10

[sinks.kafka_batches.buffer]
type = "disk"
max_size = 268435488
when_full = "block"

[sinks.kafka_batches.librdkafka_options]
"message.timeout.ms" = "310000"

[sinks.collected_logs_file]
type = "file"
inputs = ["only_chunk_batches"]
path = "/data/processed/collected_logs/collected_{{ collected_at_compact }}_{{ batch_sequence }}.json"
encoding.codec = "json"
