services:
  # База данных PostgreSQL
  db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: ${DB_CONTAINER_NAME:-cyberlog-db}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberlog-network

  # Backend приложение (Python FastAPI)
  backend:
    build:
      context: ..
      dockerfile: log_ai-agent/Dockerfile
    container_name: ${BACKEND_CONTAINER_NAME:-cyberlog-backend}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      HOST: ${BACKEND_HOST:-0.0.0.0}
      PORT: ${BACKEND_PORT:-8000}
      DEBUG: ${DEBUG:-False}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../log_ai-agent:/app/log_ai-agent
      - app_logs:/app/logs
    networks:
      - cyberlog-network
    restart: unless-stopped

  # Frontend (Vue.js сайт)
  frontend:
    build:
      context: ./site
      dockerfile: Dockerfile
    container_name: ${FRONTEND_CONTAINER_NAME:-cyberlog-frontend}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - cyberlog-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local

networks:
  cyberlog-network:
    driver: bridge
