name: Build and Push to DockerHub

on:
  push:
    branches: [axstiz]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: axstiz
          password: ${{ secrets.DOCKERHUB_KEY_AXSTIZ }}

      - name: Generate date tag
        run: echo "DATE_TAG=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Build and push
        run: |
          docker build -t axstiz/ai-cyberlogagent:latest -t axstiz/ai-cyberlogagent:$DATE_TAG -f log_ai_agent/Dockerfile log_ai_agent/
          docker push axstiz/ai-cyberlogagent:latest
          docker push axstiz/ai-cyberlogagent:$DATE_TAG