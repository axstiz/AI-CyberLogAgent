name: Run Ruff Check + Fix Issues

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Позволяет запускать вручную через интерфейс CI/CD

jobs:
  ruff-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ gitverse.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      # Запуск всех проверок параллельно и независимо
      - name: Run PEP 8 checks (E, W)
        run: |
          echo "=== Running PEP 8 checks (E, W) ==="
          ruff check . --select E,W --fix --show-fixes || echo "PEP 8 checks completed (with errors)"

      - name: Run flake8 checks (F, I)
        run: |
          echo "=== Running flake8 checks (F, I) ==="
          ruff check . --select F,I --fix --show-fixes || echo "flake8 checks completed (with errors)"

      - name: Run flake8-bugbear checks (B)
        run: |
          echo "=== Running flake8-bugbear checks (B) ==="
          ruff check . --select B --fix --show-fixes || echo "flake8-bugbear checks completed (with errors)"

      - name: Run comprehension checks (C4)
        run: |
          echo "=== Running comprehension checks (C4) ==="
          ruff check . --select C4 --fix --show-fixes || echo "comprehension checks completed (with errors)"

      - name: Run pyupgrade checks (UP)
        run: |
          echo "=== Running pyupgrade checks (UP) ==="
          ruff check . --select UP --fix --show-fixes || echo "pyupgrade checks completed (with errors)"

      - name: Run security checks (bandit, S)
        run: |
          echo "=== Running security checks (bandit, S) ==="
          ruff check . --select S --fix --show-fixes || echo "security checks completed (with errors)"

      - name: Run docstring style checks (pydocstyle, D)
        run: |
          echo "=== Running docstring style checks (pydocstyle, D) ==="
          ruff check . --select D --extend-ignore=D100 --fix --show-fixes || echo "docstring checks completed (with errors)"

      - name: Run import sorting checks (isort, ISC)
        run: |
          echo "=== Running import sorting checks (isort, ISC) ==="
          ruff check . --select ISC --fix --show-fixes || echo "import sorting checks completed (with errors)"

      - name: Format code with ruff
        run: |
          echo "=== Formatting code with ruff ==="
          ruff format . || echo "Formatting completed (with errors)"

      # Сбор изменений и коммит
      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes needed after ruff fix and format."
          else
            echo "Changes were made by ruff. Committing and pushing..."
            git config user.name "gitverse-actions[bot]"
            git config user.email "gitverse-actions[bot]@users.noreply.gitverse.com"
            git add .
            git commit -m "style: auto-fix code style issues with ruff [skip ci]"
            git push
          fi
        env:
          # Prevent CI from triggering on its own push
          CI: true