name: Run Ruff Check + Fix Issues

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Позволяет запускать вручную через интерфейс CI/CD

jobs:
  ruff-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ gitverse.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      # Флаг для отслеживания наличия ошибок
      - name: Initialize error flag
        run: |
          echo "ERRORS_FOUND=0" >> $GITHUB_ENV

      # Объединённый список всех правил
      - name: Run full ruff check
        run: |
          echo "=== Running full ruff check (E,W,F,I,B,C4,UP,S,D,ISC) ==="
          if ruff check . --select E,W,F,I,B,C4,UP,S,D,ISC --extend-ignore=D100; then
            echo "✅ No issues found."
          else
            echo "⚠️ Issues detected. Attempting to fix..."
            echo "ERRORS_FOUND=1" >> $GITHUB_ENV
          fi

      # Шаг исправления, только если были найдены ошибки
      - name: Fix code style issues
        if: env.ERRORS_FOUND == '1'
        run: |
          echo "=== Fixing issues with ruff --fix ==="
          ruff check . --select E,W,F,I,B,C4,UP,S,D,ISC --extend-ignore=D100 --fix --show-fixes

      # Повторная проверка после исправления
      - name: Re-check after fixes
        run: |
          echo "=== Re-running ruff check after fixes ==="
          if ruff check . --select E,W,F,I,B,C4,UP,S,D,ISC --extend-ignore=D100; then
            echo "✅ All issues fixed or no new issues found."
            echo "ERRORS_FOUND=0" >> $GITHUB_ENV
          else
            echo "❌ Some issues remain after autofix and require manual attention!"
            echo "ERRORS_FOUND=1" >> $GITHUB_ENV
          fi

      # Форматирование кода
      - name: Format code with ruff
        run: |
          echo "=== Formatting code with ruff ==="
          ruff format .

      # Сбор изменений и коммит
      - name: Commit and push changes
        if: env.ERRORS_FOUND == '0'
        run: |
          if git diff --quiet; then
            echo "No changes needed after ruff fix and format."
          else
            echo "Changes were made by ruff. Committing and pushing..."
            git config user.name "gitverse-actions[bot]"
            git config user.email "gitverse-actions[bot]@users.noreply.gitverse.com"
            git add .
            git commit -m "style: auto-fix code style issues with ruff [skip ci]"
            git push
          fi
        env:
          # Prevent CI from triggering on its own push
          CI: true

      # Финальная проверка: если ошибки были, завершаем с ошибкой
      - name: Check for errors
        run: |
          if [ "$ERRORS_FOUND" = "1" ]; then
            echo "\n\n❌ ОБНАРУЖЕНЫ ОШИБКИ, КОТОРЫЕ ТРЕБУЮТ ВНИМАНИЯ!\n"
            echo "Пожалуйста, проверьте логи и исправьте указанные проблемы."
            exit 1
          else
            echo "\n\n✅ Все проверки пройдены успешно!"
          fi