name: Fix Ruff Issues

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Позволяет запускать вручную через интерфейс CI/CD

jobs:
  ruff-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff with autofix
        run: |
          # Show ruff version
          ruff --version
          
          # Check and fix linting issues
          ruff check . --fix --show-fixes
          
          # Format code with ruff (replaces black)
          ruff format .
          
          # Check if there are any changes after fixing
          if git diff --quiet; then
            echo "No changes needed after ruff fix and format."
          else
            echo "Changes were made by ruff. Committing and pushing..."
            
            # Configure git
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # Add changes
            git add .
            
            # Commit changes
            git commit -m "style: auto-fix code style issues with ruff [skip ci]"
            
            # Push changes back to the repository
            git push
          fi
        env:
          # Prevent CI from triggering on its own push
          CI: true