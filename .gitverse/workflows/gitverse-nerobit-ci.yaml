version: '1.0'

# ============================================
# НАСТРОЙКИ ПАЙПЛАЙНА
# ============================================

stages:
  - lint   # Проверка кода
  - test   # Запуск тестов

# ============================================
# ОБЩИЕ НАСТРОЙКИ
# ============================================

variables:
  PYTHON_VERSION: "3.11"

# Кэширование для ускорения
cache:
  paths:
    - .cache/pip
    - .venv/
  key: "$CI_COMMIT_REF_SLUG"

# ============================================
# 1. ПРОВЕРКА КОДА С RUFF
# ============================================

ruff-lint:
  stage: lint
  image: python:$PYTHON_VERSION-slim

  before_script:
    # Установка Python зависимостей
    - pip install ruff

  script:
    # Проверка синтаксиса
    - echo "🔍 Проверка кода с Ruff..."
    - ruff check .

    # Проверка форматирования
    - echo "🎨 Проверка форматирования..."
    - ruff format --check .

  # Автоматический запуск при:
  rules:
    # 1. В Merge Request
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:  # Только при изменении Python файлов
        - "**/*.py"
        - "pyproject.toml"
        - ".ruff.toml"
        - "requirements*.txt"
        - ".gitverse-ci.yml"

    # 2. В ветках main и develop
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

    # 3. В тегах (релизы)
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# ============================================
# 2. ЗАПУСК АВТОТЕСТОВ
# ============================================

run-tests:
  stage: test
  image: python:$PYTHON_VERSION-slim
  needs: ["ruff-lint"]  # Запускаем после успешной проверки кода

  before_script:
    # Установка зависимостей для тестов
    - pip install pytest pytest-cov

  script:
    # Поиск и запуск тестов
    - |
      echo "🧪 Поиск тестовых файлов..."
      
      # Ищем все файлы с тестами
      if find . -name "*test*.py" -type f | grep -q .; then
        echo "📁 Найдены тестовые файлы:"
        find . -name "*test*.py" -type f
        
        echo "🚀 Запуск тестов..."
        # Запускаем все найденные тесты
        python -m pytest \
          --tb=short \
          --cov=. \
          --cov-report=xml:coverage.xml \
          --cov-report=term-missing \
          $(find . -name "*test*.py" -type f -not -path "./.venv/*" -not -path "*/__pycache__/*")
      else
        echo "⚠️ Тестовые файлы не найдены"
        # Создаем пустой отчет для пайплайна
        echo '<?xml version="1.0" ?><coverage></coverage>' > coverage.xml
      fi

  # Сохраняем отчеты
  artifacts:
    paths:
      - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week

  # Автоматический запуск при тех же условиях
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.py"
        - "tests/**"
        - "requirements*.txt"
        - ".gitverse-ci.yml"

    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# ============================================
# 3. АВТОФИКС КОДА (опционально, ручной запуск)
# ============================================

ruff-autofix:
  stage: lint
  image: python:$PYTHON_VERSION-slim

  before_script:
    - pip install ruff

  script:
    - echo "🔧 Применение автоматических исправлений..."
    - ruff check --fix .
    - ruff format .
    - echo "✅ Исправления применены"

  # Только ручной запуск из интерфейса Gitverse
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true