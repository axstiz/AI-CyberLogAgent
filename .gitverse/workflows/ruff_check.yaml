name: Run Ruff Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ruff-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Check PEP 8 and flake8 rules (E, W, F, I, B, C4)
        run: |
          echo "=== Проверка PEP 8 и flake8 правил ==="
          ruff check . --select=E,W,F,I,B,C4 --show-source --statistics

      - name: Check security rules (bandit - S)
        run: |
          echo "=== Проверка правил безопасности (bandit) ==="
          ruff check . --select=S --show-source --statistics

      - name: Check documentation rules (pydocstyle - D)
        run: |
          echo "=== Проверка правил документации (pydocstyle) ==="
          ruff check . --select=D --show-source --statistics

      - name: Check import rules (isort - ISC)
        run: |
          echo "=== Проверка правил сортировки импортов (isort) ==="
          ruff check . --select=ISC --show-source --statistics

      - name: Check code modernization rules (pyupgrade - UP)
        run: |
          echo "=== Проверка правил современного кода (pyupgrade) ==="
          ruff check . --select=UP --show-source --statistics

      - name: Format code with ruff
        run: |
          echo "=== Проверка форматирования кода ==="
          ruff format . --check --diff