services:
  mitre-log-simulator:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-cyberlogagent-mitre-simulator:latest
    container_name: ai-cyberlogagent-mitre-simulator
    init: true
    environment:
      SIM_TECHNIQUE: ${SIM_TECHNIQUE:-}
      SIM_RANDOM_ATTACKS: ${SIM_RANDOM_ATTACKS:-false}
      SIM_NO_ATTACKS: ${SIM_NO_ATTACKS:-false}
      SIM_INTERVAL_SECONDS: ${SIM_INTERVAL_SECONDS:-30}
      SIM_NOISE_BATCH_SIZE: ${SIM_NOISE_BATCH_SIZE:-30}
      SIM_OUTPUT_DIR: /app/output
      SIM_LOG_FILE: /app/output/generated_logs.log
      SIM_TIMELINE_FILE: /app/output/attack_timeline.log
      SIM_MARKERS_FILE: /app/output/attack_markers.csv
      SIM_UNKNOWN_FILE: /host_output/unknown_techniques.txt
      SIM_ATOMICS_FOLDER: /opt/atomic-red-team/atomics
      SIM_HOST_OUTPUT_DIR: /host_output
    volumes:
      - shared_external_logs:/app/output
      - ${SHARED_EXTERNAL_LOGS_BIND:-./shared_external_logs}:/host_output

volumes:
  shared_external_logs:
    external: true
    name: ${SHARED_EXTERNAL_LOGS_VOLUME_NAME:-cyberlog_external_logs}